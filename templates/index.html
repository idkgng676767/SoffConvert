<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SOFFICE Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-name">SOFFICE Converter</span>
          <span class="brand-meta">Free · Local · No ads</span>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section class="card fu">
        <p class="chip">Paste-free local conversion</p>
        <h1>Convert documents without <em>the headache.</em></h1>
        <p class="sub">
          Upload a file, choose your target format, and download the converted result.
        </p>

        {% if error %}
        <div class="alert" role="alert">{{ error }}</div>
        {% endif %}

        <form action="{{ url_for('convert') }}" method="post" enctype="multipart/form-data" class="form-grid">
          <label for="file">File</label>
          <input id="file" name="file" type="file" required />

          <label for="target_format">Output format</label>
          <div class="select-wrap">
            <select id="target_format" name="target_format" required>
              <option value="" disabled {% if not selected_format %}selected{% endif %}>Choose output format</option>
              {% for fmt in common_formats %}
              <option value="{{ fmt }}" {% if selected_format == fmt %}selected{% endif %}>{{ fmt|upper }}</option>
              {% endfor %}
            </select>
          </div>

          <button type="submit">Convert file</button>
        </form>

        <p class="hint">
          Pick the file type you want from the dropdown, then convert.
        </p>
      </section>
    </main>
  </body>
</html>
